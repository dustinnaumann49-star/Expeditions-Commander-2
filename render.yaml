services:
  - type: web
    name: expedition-commander-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://expedition-commander-client.onrender.com
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1

  - type: web
    name: expedition-commander-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://expedition-commander-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
